name: EasyCrypt
permissions:
  contents: read
  pages: write
  id-token: write

on:
  workflow_call:
  workflow_dispatch:

env:
  NIXPKGS_ALLOW_UNFREE: 1
  ECRJOBS: 8

jobs:
    test_extraction:
        name: Extract MLKEM to EC
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          matrix:
            size: [ '768', '1024' ]
            dir: [ 'ref', 'avx2' ]
        steps:
        - uses: actions/checkout@v4
        - uses: cachix/install-nix-action@v31
          with:
            nix_path: nixpkgs=channel:nixos-unstable
        - run: nix-shell --arg full false --run "echo Dependencies OK…"
        - run: nix-shell --arg full false --run "make -C code/jasmin/${{matrix.size}}/${{matrix.dir}}/extraction ec"
    test_proofs:
        name: Check Proofs
        runs-on: ubuntu-latest
        strategy:
          fail-fast: false
          matrix:
            category:
            - correctness_768_ref
            - correctness_768_avx2
            - correctness_1024_ref
            - correctness_1024_avx2
            - safety_768_ref
            - safety_768_avx2
            - safety_1024_ref
            - safety_1024_avx2
            - security
            - spec_bridge
        steps:
        - uses: actions/checkout@v4
        - name: Install Nix
          uses: cachix/install-nix-action@v31
          with:
            nix_path: nixpkgs=channel:nixos-unstable
        - name: Check Dependencies
          run: nix-shell --run "echo Dependencies OK…"
        - name: Configure provers
          run: nix-shell --run 'easycrypt why3config'
        - name: Print EasyCrypt configuration
          run: nix-shell --run 'easycrypt config'
        - name: Check EasyCrypt proofs (${{matrix.category}})
          id: ec_proofs 
          run: |
            set -o pipefail
            nix-shell --run "easycrypt runtest -report report.yaml config/tests.config mlkem_${{matrix.category}}"
        - name: Generate Detailed Job Summary
          if: always() 
          run: |
            export PROOF_JOB_OUTCOME=${{ steps.ec_proofs.outcome }}
            python scripts/report_proofs_result.py \
              report.yaml \
              "${{matrix.category}}"
    heatmap_proofs:
      name: Generate Heatmap of Proofs
      permissions:
        contents: read
        pages: write
        id-token: write
      uses: ./.github/workflows/heatmap.yml
      secrets: inherit 