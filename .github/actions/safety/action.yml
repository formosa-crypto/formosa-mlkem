name: Safety Check
description: Run safety checks for MLKEM implementation using Valgrind

inputs:
  size:
    description: 'Size of the implementation (768 or 1024)'
    required: true
  dir:
    description: 'Directory of the implementation (ref or avx2)'
    required: true


runs:
  using: composite
  steps:
  - uses: cachix/install-nix-action@v31
    with:
      nix_path: nixpkgs=channel:nixos-unstable
  - name: Checks Dependencies
    shell: bash 
    run: nix-shell --arg full false --run "echo Dependencies OK…"
  - name: Run Valgrind Memory Check
    shell: bash 
    run: nix-shell --arg full false --run "make -C tests memory_${{inputs.size}}_${{inputs.dir}}"
  - name: Print Valgrind Output
    shell: bash 
    if: always()
    run: |
      echo "## Valgrind Memory Check Results - MLKEM${{inputs.size}} (${{inputs.dir}})" >> $GITHUB_STEP_SUMMARY
      echo '```' >> $GITHUB_STEP_SUMMARY
      cat 'tests/memory_${{inputs.size}}_${{inputs.dir}}.out' >> $GITHUB_STEP_SUMMARY
      echo '```' >> $GITHUB_STEP_SUMMARY
